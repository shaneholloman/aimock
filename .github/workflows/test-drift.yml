name: Drift Tests
on:
  schedule:
    - cron: "0 6 * * *" # Daily 6am UTC
  pull_request:
    paths:
      - "src/agui-types.ts"
      - "src/__tests__/drift/agui-schema.drift.ts"
  workflow_dispatch: # Manual trigger
jobs:
  agui-schema-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Clone ag-ui repo
        run: git clone --depth 1 https://github.com/ag-ui-protocol/ag-ui.git ../ag-ui

      - name: Run AG-UI schema drift test
        run: npx vitest run src/__tests__/drift/agui-schema.drift.ts --config vitest.config.drift.ts

  drift:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run drift tests
        id: drift
        run: |
          set +e
          npx tsx scripts/drift-report-collector.ts
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          if [ "$EXIT_CODE" -eq 2 ]; then
            : # critical drift found, continue
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Collector script crashed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ steps.drift.outputs.exit_code }}" = "2" ]; then
            EMOJI="🚨"
            MSG="*Drift detected* in aimock — providers changed response formats. <https://github.com/CopilotKit/aimock/actions/runs/${{ github.run_id }}|View run>"
          elif [ "${{ job.status }}" = "success" ]; then
            EMOJI="✅"
            MSG="Drift tests passed — all providers match."
          else
            EMOJI="❌"
            MSG="*Drift tests failed* (infra error). <https://github.com/CopilotKit/aimock/actions/runs/${{ github.run_id }}|View run>"
          fi
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"${EMOJI} ${MSG}\"}"
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Fail if critical drift detected
        if: steps.drift.outputs.exit_code == '2'
        run: exit 1
