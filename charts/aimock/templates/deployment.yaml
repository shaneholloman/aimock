apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aimock.fullname" . }}
  labels:
    {{- include "aimock.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aimock.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aimock.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: aimock
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--fixtures"
            - "{{ .Values.fixtures.mountPath }}"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "{{ .Values.service.port }}"
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.fixtures.existingClaim }}
          volumeMounts:
            - name: fixtures
              mountPath: {{ .Values.fixtures.mountPath }}
          {{- end }}
      {{- if .Values.fixtures.existingClaim }}
      volumes:
        - name: fixtures
          persistentVolumeClaim:
            claimName: {{ .Values.fixtures.existingClaim }}
      {{- end }}
